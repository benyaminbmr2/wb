<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clan Details</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #334155;
    padding:8px;
    text-align:center;
}

th{
    background:#1e293b;
}
.back-btn{
    background:linear-gradient(135deg,#facc15,#eab308);
    color:#000;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;

    box-shadow:0 0 15px rgba(250,204,21,.5);
    transition:all .3s ease;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(250,204,21,.8);
}

.big-logo{
    width:120px;
    height:120px;
    display:block;
    margin:0 auto 15px;
}

.top-player{
    background:#334155;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    font-weight:bold;
    border-left:4px solid gold;
    box-shadow:0 0 10px rgba(250,204,21,0.3);
}

tr:nth-child(even){
    background:#172033;
}
.member-card{
    display:none;
}

@media (max-width:768px){

    table{
        display:none;
    }

    .member-card{
        display:block;
        background:#1e293b;
        padding:15px;
        margin:10px 0;
        border-radius:12px;
        border:1px solid #334155;
    }

    .member-card h3{
        margin:0 0 10px 0;
        color:#facc15;
    }

    .member-card p{
        margin:5px 0;
    }
}

html::-webkit-scrollbar{
    width:14px;
}

html::-webkit-scrollbar-track{
    background:#0f172a;
}

html::-webkit-scrollbar-thumb{
    background:linear-gradient(
        180deg,
        #facc15,
        #ea7908
    );

    border-radius:20px;

    box-shadow:
        0 0 10px #facc15;
}

html::-webkit-scrollbar-thumb:hover{
    background:#f39c11;
}
.champion-row{
    background:rgba(250,204,21,.15) !important;
    border-left:4px solid gold;
}

.champion-row td{
    color:#facc15;
    font-weight:bold;
}

.card h1{
    font-size:42px;
    color:#facc15;
    text-shadow:
        0 0 10px #facc15,
        0 0 20px #facc15;
    text-align:center;
}

.card h2{
    color:#38bdf8;
    margin-top:25px;
    font-size:24px;
    text-shadow:0 0 10px rgba(56,189,248,.5);
}

.card p{
    font-size:18px;
    line-height:1.8;
}

.player-link{
    color:white;
    text-decoration:none;
    font-weight:bold;
    transition:.3s;
}

.player-link:hover{
    color:#facc15;
    text-shadow:0 0 10px #facc15;
}

.top-player{
    background:linear-gradient(
        135deg,
        #1e293b,
        #334155
    );

    padding:15px;
    margin:12px 0;
    border-radius:15px;

    border:1px solid #475569;

    transition:.3s;
}

.top-player:hover{
    transform:translateX(10px);
    box-shadow:
        0 0 15px rgba(250,204,21,.5);
}

.card{
    background:linear-gradient(
        145deg,
        #1e293b,
        #111827
    );

    border:1px solid #334155;

    box-shadow:
        0 0 25px rgba(0,0,0,.4);

    padding:25px;
}

.big-logo{
    width:140px;
    height:140px;

    border-radius:50%;

    border:4px solid rgb(255, 230, 0);

    box-shadow:
        0 0 20px rgb(0, 21, 255);

    animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
    0%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0);}
}
.daily-champion-card{

    background:linear-gradient(
        135deg,
        #faa615,
        #0b1bf5
    );

    color:#111827;

    padding:20px;

    border-radius:20px;

    text-align:center;

    margin:20px 0;

    box-shadow:
        0 0 25px gold;

    animation:
        championGlow 2s infinite alternate;
}

.daily-champion-card h2{
    color:#111827 !important;
    text-shadow:none !important;
}

@keyframes championGlow{

    from{
        box-shadow:
        0 0 15px gold;
    }

    to{
        box-shadow:
        0 0 35px gold;
    }

}

</style>

</head>
<body>
<button onclick="history.back()" class="back-btn">
    🏆 Back To Top Clans
</button>

<div id="clanInfo"></div>

<script>

const tag = new URLSearchParams(window.location.search).get("tag");

fetch("clans.json")
.then(r => r.json())
.then(clans => {

    const clan = clans.find(c =>
        c.tag.replace("#","") === tag.replace("#","")
    );

    if(!clan){
        document.body.innerHTML = "<h1>Clan not found</h1>";
        return;
    }

    const topDonator =
        [...clan.membersData]
        .sort((a,b)=>b.donations-a.donations)[0];

    const topPlayer =
        [...clan.membersData]
        .sort((a,b)=>b.trophies-a.trophies)[0];
        const topDonator24h =
    [...clan.membersData]
    .sort((a,b)=>
        (b.donations24h || 0) -
        (a.donations24h || 0)
    )[0];

const clanDonations24h =
    clan.membersData.reduce(
        (sum,player)=>
        sum + (player.donations24h || 0),
        0
    );
        const top5Donators =
    [...clan.membersData]
    .sort((a,b)=>b.donations-a.donations)
    .slice(0,5);

let topDonatorsHTML = "";

top5Donators.forEach((player,index)=>{

    const medal =
        index === 0 ? "👑" :
        index === 1 ? "🥈" :
        index === 2 ? "🥉" :
        "🏅";

    topDonatorsHTML += `
    <div class="top-player">
        ${medal} #${index+1}
        ${player.name}
        (${player.donations} Donations)
    </div>
    `;
});

    let membersHTML = "";
    let membersCardsHTML = "";
const championTag = topDonator24h.tag;
    clan.membersData
    .sort((a,b)=>b.donations-a.donations)
    .forEach(member=>{

  membersHTML += `
<tr class="${
member.tag === championTag
? 'champion-row'
: ''
}">

    <td>
        <a class="player-link"
           href="player.html?tag=${member.tag.replace("#","")}">
           ${
             member.tag === championTag
             ? "👑 " + member.name
             : member.name
           }
        </a>
    </td>

    <td>${member.role}</td>
    <td>${member.townHall}</td>
    <td>${member.trophies}</td>
    <td>${member.donations}</td>
    <td>${member.expLevel}</td>

</tr>
`;
        membersCardsHTML += `
<div class="member-card">
    <h3>👤 ${member.name}</h3>

    <p>🎖 Role: ${member.role}</p>
    <p>🏰 TH: ${member.townHall}</p>
    <p>🏆 Trophies: ${member.trophies}</p>
    <p>🎁 Donations: ${member.donations}</p>
    <p>⭐ Level: ${member.expLevel}</p>
</div>
`;
    });

    document.getElementById("clanInfo").innerHTML = `
    
    <div class="card">
        <img src="${clan.logo}" class="big-logo">
        <h1>${clan.name}</h1>

        <p><b>Tag:</b> ${clan.tag}</p>
        <p><b>Leader:</b> ${clan.leader}</p>
        <p><b>Level:</b> ${clan.level}</p>
        <p><b>Members:</b> ${clan.members}</p>
        <p><b>Points:</b> ${clan.points}</p>
        <p><b>War Wins:</b> ${clan.warWins}</p>
        <p><b>Total Donations:</b> ${clan.donations}</p>

        <hr>

        <h2>🏆 Top Donator</h2>
        <p>${topDonator.name} (${topDonator.donations})</p>

        <h2>🏆 Top Trophy Player</h2>
        <p>${topPlayer.name} (${topPlayer.trophies})</p>
<div class="daily-champion-card">

    <h2>👑 Daily Champion Clan 👑</h2>

    <h1>
        ${topDonator24h.name}
    </h1>

    <h3>
        🎁 ${topDonator24h.donations24h || 0}
        Donations
    </h3>

</div>
<h2>🔥 Clan Donations 24H</h2>
<p>${clanDonations24h}</p>

<h2>🔥 Top 5 Donators</h2>
${topDonatorsHTML}

    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>TH</th>
                <th>Trophies</th>
                <th>Donations</th>
                <th>Level</th>
            </tr>
        </thead>

        <tbody>
            ${membersHTML}
        </tbody>

    </table>
        <div class="mobile-members">
        ${membersCardsHTML}
    </div>
    `;
});

</script>

</body>
</html>
