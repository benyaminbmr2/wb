<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Clan Details</title>

<style>
body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    padding:20px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    border:1px solid #334155;
    padding:8px;
    text-align:center;
}

th{
    background:#1e293b;
}
.back-btn{
    background:linear-gradient(135deg,#facc15,#eab308);
    color:#000;
    border:none;
    padding:12px 24px;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    margin-bottom:20px;

    box-shadow:0 0 15px rgba(250,204,21,.5);
    transition:all .3s ease;
}

.back-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(250,204,21,.8);
}

.big-logo{
    width:120px;
    height:120px;
    display:block;
    margin:0 auto 15px;
}

.top-player{
    background:#334155;
    padding:12px;
    margin:10px 0;
    border-radius:12px;
    font-weight:bold;
    border-left:4px solid gold;
    box-shadow:0 0 10px rgba(250,204,21,0.3);
}

tr:nth-child(even){
    background:#172033;
}
.member-card{
    display:none;
}

@media (max-width:768px){

    table{
        display:none;
    }

    .member-card{
        display:block;
        background:#1e293b;
        padding:15px;
        margin:10px 0;
        border-radius:12px;
        border:1px solid #334155;
    }

    .member-card h3{
        margin:0 0 10px 0;
        color:#facc15;
    }

    .member-card p{
        margin:5px 0;
    }
}
</style>

</head>
<body>
<button onclick="history.back()" class="back-btn">
    🏆 Back To Top Clans
</button>

<div id="clanInfo"></div>

<script>

const tag = new URLSearchParams(window.location.search).get("tag");

fetch("clans.json")
.then(r => r.json())
.then(clans => {

    const clan = clans.find(c =>
        c.tag.replace("#","") === tag.replace("#","")
    );

    if(!clan){
        document.body.innerHTML = "<h1>Clan not found</h1>";
        return;
    }

    const topDonator =
        [...clan.membersData]
        .sort((a,b)=>b.donations-a.donations)[0];

    const topPlayer =
        [...clan.membersData]
        .sort((a,b)=>b.trophies-a.trophies)[0];
        const top5Donators =
    [...clan.membersData]
    .sort((a,b)=>b.donations-a.donations)
    .slice(0,5);

let topDonatorsHTML = "";

top5Donators.forEach((player,index)=>{

    const medal =
        index === 0 ? "👑" :
        index === 1 ? "🥈" :
        index === 2 ? "🥉" :
        "🏅";

    topDonatorsHTML += `
    <div class="top-player">
        ${medal} #${index+1}
        ${player.name}
        (${player.donations} Donations)
    </div>
    `;
});

    let membersHTML = "";
    let membersCardsHTML = "";

    clan.membersData
    .sort((a,b)=>b.donations-a.donations)
    .forEach(member=>{

        membersHTML += `
        <tr>
            <td>${member.name}</td>
            <td>${member.role}</td>
            <td>${member.townHall}</td>
            <td>${member.trophies}</td>
            <td>${member.donations}</td>
            <td>${member.expLevel}</td>
        </tr>
        `;
        membersCardsHTML += `
<div class="member-card">
    <h3>👤 ${member.name}</h3>

    <p>🎖 Role: ${member.role}</p>
    <p>🏰 TH: ${member.townHall}</p>
    <p>🏆 Trophies: ${member.trophies}</p>
    <p>🎁 Donations: ${member.donations}</p>
    <p>⭐ Level: ${member.expLevel}</p>
</div>
`;
    });

    document.getElementById("clanInfo").innerHTML = `
    
    <div class="card">
        <img src="${clan.logo}" class="big-logo">
        <h1>${clan.name}</h1>

        <p><b>Tag:</b> ${clan.tag}</p>
        <p><b>Leader:</b> ${clan.leader}</p>
        <p><b>Level:</b> ${clan.level}</p>
        <p><b>Members:</b> ${clan.members}</p>
        <p><b>Points:</b> ${clan.points}</p>
        <p><b>War Wins:</b> ${clan.warWins}</p>
        <p><b>Total Donations:</b> ${clan.donations}</p>

        <hr>

        <h2>🏆 Top Donator</h2>
        <p>${topDonator.name} (${topDonator.donations})</p>

        <h2>🏆 Top Trophy Player</h2>
        <p>${topPlayer.name} (${topPlayer.trophies})</p>
        <h2>🔥 Top 5 Donators</h2>

${topDonatorsHTML}

    </div>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Role</th>
                <th>TH</th>
                <th>Trophies</th>
                <th>Donations</th>
                <th>Level</th>
            </tr>
        </thead>

        <tbody>
            ${membersHTML}
        </tbody>

    </table>
        <div class="mobile-members">
        ${membersCardsHTML}
    </div>
    `;
});

</script>

</body>
</html>
