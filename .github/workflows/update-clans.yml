name: Update Clans

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  update:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install axios

      - run: node updateClans.js
        env:
          CLASH_API_TOKEN: ${{ secrets.CLASH_API_TOKEN }}

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add clans.json
          git diff --staged --quiet || git commit -m "Auto update clans"
          git push